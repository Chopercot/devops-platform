apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-app-blue
  namespace: devops-platform

spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-app
      version: blue

  template:
    metadata:
      labels:
        app: devops-app
        version: blue

    spec:
      containers:
        - name: devops-app
          image: devops-platform:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080

          env:
            - name: APP_VERSION
              value: "blue"
